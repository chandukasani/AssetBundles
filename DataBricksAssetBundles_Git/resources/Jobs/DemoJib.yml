resources:
  jobs:
    DemoJob:
      name: ParamterisedJob
      tasks:
        - task_key: RunNotebook
          notebook_task:
            notebook_path: ../../src/Notebooks/SampleNotebook.ipynb
            base_parameters:
              catalog_name: ${var.catalog_name}
              schema_name: ${var.schema_name}
            source: WORKSPACE
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED