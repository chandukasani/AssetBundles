# This is a Databricks asset bundle definition for DataBricksAssetBundles_Git.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: DataBricksAssetBundles_Git
  uuid: 4ffeb5bd-9aeb-4b3e-9556-6246e11a5fb7

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog_name:
    default: "devcatalog"
  schema_name:
    default: "information_schema"

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment: false
    variables:
      catalog_name: "devcatalog"
      schema_name: "information_schema"
    workspace:
      host: https://dbc-9ec60a6b-8298.cloud.databricks.com
      root_path: /Workspace/Users/chandukasani00@gmail.com/AssetBundles/.bundle/${bundle.name}/${bundle.target}
  prod:
    mode: production
    presets:
      name_prefix: prod_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-9ec60a6b-8298.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/chandukasani00@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/chandukasani00@gmail.com/AssetBundles/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog_name: "prodcatalog"
      schema_name: "information_schema"
    permissions:
      - user_name: chandukasani00@gmail.com
        level: CAN_MANAGE
